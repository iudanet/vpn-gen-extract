version: 2

project_name: vpn-gen-extract

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: vpn-gen-extract
    main: ./cmd/vpn-gen-extract
    binary: vpn-gen-extract
    # Статические бинарники: без cgo они не зависят от libc и одинаково
    # работают на glibc, musl (Alpine) и в scratch-контейнере.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  footer: |
    ## Установка

    Скачайте архив для своей платформы, распакуйте и запустите:

    ```bash
    vpn-gen-extract -file url.txt
    ```

    Бинарники статические (CGO_ENABLED=0) — внешних зависимостей нет.
