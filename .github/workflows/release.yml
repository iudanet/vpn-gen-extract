name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Линтер и тесты — гейт: релиз не публикуется, пока они не пройдут.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  goreleaser:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # GoReleaser строит changelog по истории, поэтому нужен полный клон.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
